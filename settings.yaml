  autostart: True          # Should IOC Manager try to start this?
  ip: '129.57.37.111'
  port: '1003'    # channel 1 of serial to ethernet
  timeout: 2
  delay: 10
  channels:
    - Magnet_LI
  records:
    Magnet_LI:
      DESC: 'Magnet Level Probe Reading'
      PREC: 2
      EGU: 'cm'
      HIHI: 65
      HIGH: 64
      LOW: 40
      LOLO: 36
cm4g_magnet:
  module: 'devices.cm4g_magnet'
  autostart: True          # Should IOC Manager try to start this?
