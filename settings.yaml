  port: '4444'    # channel 1 of serial to ethernet
  timeout: 2
  delay: 2
  channels:
    - Magnet
  records:
    Magnet_VI:
      DESC: 'Magnet Lead Voltage'
      PREC: 3
      EGU: 'V'
      HIHI: 10
      HIGH: 8
      LOW: -8
      LOLO: -10
    Magnet_Coil_CI:
      DESC: 'Magnet Coil Current'
      PREC: 3
      EGU: 'A'
      HIHI: 85
      HIGH: 83
      LOW: -1
      LOLO: -2
    Magnet_Lead_CI:
      DESC: 'Magnet Lead Current'
      PREC: 3
      EGU: 'A'
      HIHI: 85
      HIGH: 83
      LOW: -1
      LOLO: -2
    Magnet_ULIM:
      DESC: 'Magnet Upper Current Limit'
      PREC: 3
      EGU: 'A'
      HIHI: 85
      HIGH: 83
      LOW: -83
      LOLO: -85
    Magnet_LLIM:
      DESC: 'Magnet Lower Current Limit'
