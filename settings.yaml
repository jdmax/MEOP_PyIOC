dat8017_i:
  module: 'devices.dat8017'
  autostart: True
  ip: '129.57.37.137'
  port: '502'
  timeout: 2
  delay: 5
  channels: # List of PV names for each read channel of datexel in order
    - Bottle_PI
    - Absorb_CI
  calibration: # psi gauge range for calibration
    Bottle_PI: 3000
    Absorb_CI: 1
  records:
    Bottle_PI:
      DESC: 'Bottle Pressure'
      PREC: 3
      EGU: 'psi'
      HIHI: 2600
      HIGH: 2500
      LOW: 50
      LOLO: 10
    Absorb_PI:
      DESC: 'Pump Laser Absorption'
      PREC: 3
      EGU: 'mA'
      HIHI: 20
      HIGH: 20
      LOW: 0
      LOLO: 0
mks937b:
    module: 'devices.mks937b'
    autostart: False          # Should IOC Manager try to start this?
    ip: '192.168.1.107'
    port: '1001'            # channel 3 of serial to ethernet
    address: '003'          # serial address set on device, must be 3 digits
    timeout: 2
    delay: 2
    channels:
        - OVC_CC_PI
        - None
        - OVC_Pirani_PI
alicat:
    module: 'devices.alicat_flow'
    autostart: False          # Should IOC Manager try to start this?
    ip: '129.57.37.86'
    port: '44818'
    timeout: 2
    delay: 2
    gas_type: 'He'  # Gas type, "N2", "He", or other listed in manual. Can also be number from manual.
    channels:
        - Outflow
pid_temp:
  module: 'devices.pid_controller'
  autostart: True
  delay: 1  # Update rate in seconds
  input_pv: 'TGT:MEOP:Test_TI'  # Read temperature from this PV
  output_pv: 'TGT:MEOP:Test_Heater_CI'  # Write output to this PV
  outs:
    kp: 2.0
    ki: 0.5
    kd: 0.1
    setpoint: 4.5  # Initial setpoint in K
    min_output: 0
    max_output: 100
    min_change: 0.0
    max_change: 100.0
    auto_start: False  # Start in manual mode
  channels:   # for PID, just list one channel
    - PID_Temp
  records:
    PID_Temp_SP:
      DESC: 'Temperature Setpoint'
      PREC: 3
      EGU: 'K'
      DRVH: 300
      DRVL: 2