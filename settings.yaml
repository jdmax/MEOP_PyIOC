# IOC device settings, YAML
# With exception of 'general', each top level key defines a new ioc for that device
general:
  prefix: TGT:MEOP
  log_dir: 'logs'   # path of logs directory
  #epics_addr_list: '129.57.86.255'  # In Hall B
  epics_addr_list: '127.255.255.255'  # On experimental equipment network
  #epics_beacon_addr_list: '127.255.255.255'
  delay: 0.5
ioc_load:
  module: 'devices.ioc_load'
  timeout: 2
  delay: 2
  channels: []
pfeiffer-26x_1:
  module: 'devices.tpg_26x'
  autostart: True
  ip: '129.57.37.103'
  port: '1001'            # channel 1 of serial to ethernet
  timeout: 2
  delay: 5
  channels:
    - Outlet_PI
    - OVC_PI
  records:
    Outlet_PI:
      DESC: 'Outlet Pressure'
      PREC: 2
      EGU: 'mbar'
      HIHI: 1300
      HIGH: 1200
      LOW: -100
      LOLO: -150
    OVC_PI:
      DESC: 'Magnet OVC Pressure'
      PREC: 2
      EGU: 'mbar'
      HIHI: 1300
      HIGH: 1200
      LOW: -100
      LOLO: -150

pfeiffer-26x_2:
  module: 'devices.tpg_26x'
  autostart: True
  ip: '129.57.37.103'
  port: '1002'            # channel 2 of serial to ethernet
  timeout: 2
  delay: 5
  channels:
    - Inlet_PI
  records:
    Inlet_PI:
      DESC: 'Inlet Pressure'
      PREC: 2
      EGU: 'mbar'
      HIHI: 1300
      HIGH: 1200
      LOW: -100
      LOLO: -150
si9700:
  module: 'devices.si9700'
  autostart: True
  ip: '129.57.37.103'
  port: '1003'            # channel 3 of serial to ethernet
  timeout: 2
  delay: 5
  channels:
    - Liquifier
    - None
  records:
    Liquifier_TI:
      DESC: 'Temperature from Liquifier Controller'
      PREC: 4
      EGU: 'K'
      HIHI: 310
      HIGH: 300
      LOW: 2
      LOLO: 1
    Liquifier_Heater:
      DESC: 'Heater Percentage'
      PREC: 1
      EGU: '%'
      HIHI: 100
      HIGH: 95
      LOW: -1
      LOLO: -2
    Liquifier_SP:
      DESC: 'Setpoint from Liquifier Controller'
      PREC: 3
      EGU: 'K'
      HIHI: 300
      HIGH: 275
      LOW: 2
      LOLO: 1
    Liquifier_Mode:
      DESC: 'Heater Mode from Liquifier Controller'
lakeshore_218:  # Lakeshore RS232: 7 data bits, Odd parity, 1 stop bit
  module: 'devices.ls218'
  autostart: True          # Should IOC Manager try to start this?
  ip: '129.57.37.111'
  port: '1002'    # channel 1 of serial to ethernet
  timeout: 2
  delay: 10
  channels: # List of PV names for each read channel of 218 in order
    - Reservoir_TI
    - None
    - None
    - None
    - OVC_TI
    - Shield_TI
    - None
    - None
  records:
    Reservoir_TI:
      DESC: 'Temperature of Magnet Reservoir'
      PREC: 2
      EGU: 'K'
      HIHI: 310
      HIGH: 300
      LOW: 2
      LOLO: 1
    Shield_TI:
      DESC: 'Temperature of Magnet Shield'
      PREC: 2
      EGU: 'K'
      HIHI: 310
      HIGH: 300
      LOW: 2
      LOLO: 1
    OVC_TI:
      DESC: 'Temperature of Magnet OVC'
      PREC: 2
      EGU: 'K'
      HIHI: 310
      HIGH: 300
      LOW: 2
      LOLO: 1
